services:
  myblock-server:
    build: .
    container_name: myblock-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://myblocksd.xyz,https://www.myblocksd.xyz,http://localhost:3000}
